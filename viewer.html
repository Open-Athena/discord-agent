<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord Archive Viewer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #313338;
  --bg-secondary: #2b2d31;
  --bg-tertiary: #1e1f22;
  --bg-hover: #35373c;
  --bg-active: #404249;
  --bg-message-hover: #2e3035;
  --text-primary: #f2f3f5;
  --text-secondary: #b5bac1;
  --text-muted: #949ba4;
  --text-link: #00a8fc;
  --accent: #5865f2;
  --accent-hover: #4752c4;
  --border: #3f4147;
  --reply-border: #4e5058;
  --embed-bg: #2b2d31;
  --embed-border: #1e1f22;
  --code-bg: #1e1f22;
  --reaction-bg: #2b2d31;
  --reaction-border: #3f4147;
  --search-bg: #1e1f22;
  --scrollbar-thumb: #1a1b1e;
  --scrollbar-track: #2b2d31;
}
html, body { height: 100%; }
body {
  font-family: 'gg sans', 'Noto Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  display: flex;
  overflow: hidden;
  font-size: 15px;
  line-height: 1.375;
}
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }

/* Sidebar */
#sidebar {
  width: 240px;
  min-width: 240px;
  background: var(--bg-secondary);
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--bg-tertiary);
}
#sidebar-header {
  padding: 12px 16px;
  font-weight: 600;
  font-size: 16px;
  border-bottom: 1px solid var(--bg-tertiary);
  color: var(--text-primary);
}
#channel-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.channel-item {
  display: flex;
  align-items: center;
  padding: 6px 8px 6px 16px;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 14px;
  border-radius: 4px;
  margin: 0 8px;
  transition: background 0.1s, color 0.1s;
}
.channel-item:hover { background: var(--bg-hover); color: var(--text-secondary); }
.channel-item.active { background: var(--bg-active); color: var(--text-primary); }
.channel-item .hash {
  margin-right: 6px;
  font-size: 18px;
  font-weight: 500;
  opacity: 0.5;
}
.channel-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.channel-item .count {
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-tertiary);
  padding: 1px 5px;
  border-radius: 8px;
  margin-left: 4px;
}

/* Main content */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
#header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--bg-tertiary);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-primary);
}
#header .channel-name {
  font-weight: 600;
  font-size: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
}
#header .channel-name .hash { color: var(--text-muted); }
#header .channel-info {
  color: var(--text-muted);
  font-size: 13px;
}
#search-container {
  margin-left: auto;
  position: relative;
}
#search-input {
  background: var(--search-bg);
  border: none;
  border-radius: 4px;
  color: var(--text-primary);
  padding: 6px 10px;
  font-size: 14px;
  width: 240px;
  outline: none;
  font-family: inherit;
  transition: width 0.2s;
}
#search-input:focus { width: 340px; }
#search-input::placeholder { color: var(--text-muted); }

/* Messages area */
#messages-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px 0;
}
#messages-list { max-width: 100%; }
.loading, .empty-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  font-size: 16px;
}

/* Message */
.message-group {
  padding: 2px 48px 2px 72px;
  position: relative;
  margin-top: 0;
}
.message-group:hover { background: var(--bg-message-hover); }
.message-group.has-header { margin-top: 17px; }
.message-group .avatar {
  position: absolute;
  left: 16px;
  top: 2px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  overflow: hidden;
  background: var(--bg-active);
}
.message-group .avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.msg-header {
  display: flex;
  align-items: baseline;
  gap: 8px;
}
.msg-header .author {
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  color: var(--text-primary);
}
.msg-header .author:hover { text-decoration: underline; }
.msg-header .timestamp {
  font-size: 12px;
  color: var(--text-muted);
  text-decoration: none;
}
.msg-header .timestamp:hover { text-decoration: underline; }
.msg-header .edited-tag {
  font-size: 10px;
  color: var(--text-muted);
}

/* Reply */
.reply-indicator {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 2px;
  padding-left: 36px;
  position: relative;
}
.reply-indicator::before {
  content: '';
  position: absolute;
  left: 20px;
  top: 50%;
  width: 12px;
  height: 12px;
  border-left: 2px solid var(--reply-border);
  border-top: 2px solid var(--reply-border);
  border-radius: 4px 0 0 0;
}
.reply-indicator .reply-avatar {
  display: inline-block;
  width: 16px;
  height: 16px;
  min-width: 16px;
  border-radius: 50%;
  overflow: hidden;
  background: var(--bg-active);
  vertical-align: middle;
}
.reply-indicator .reply-avatar img { width: 16px; height: 16px; border-radius: 50%; object-fit: cover; }
.reply-indicator .reply-author {
  font-weight: 600;
  font-size: 12px;
  color: var(--text-secondary);
}
.reply-indicator .reply-content {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 400px;
  cursor: pointer;
}
.reply-indicator .reply-content:hover { color: var(--text-primary); }

/* Content */
.msg-content { word-wrap: break-word; white-space: pre-wrap; }
.msg-content a { color: var(--text-link); text-decoration: none; }
.msg-content a:hover { text-decoration: underline; }
.msg-content strong { font-weight: 700; }
.msg-content em { font-style: italic; }
.msg-content code {
  background: var(--code-bg);
  padding: 0.1em 0.3em;
  border-radius: 3px;
  font-size: 0.875em;
  font-family: 'Consolas', 'Andale Mono WT', 'Andale Mono', 'Menlo', monospace;
}
.msg-content pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px;
  margin: 4px 0;
  overflow-x: auto;
  white-space: pre;
}
.msg-content pre code {
  background: none;
  padding: 0;
  font-size: 0.875em;
}
.msg-content .mention {
  background: rgba(88, 101, 242, 0.3);
  color: #c9cdfb;
  padding: 0 2px;
  border-radius: 3px;
  font-weight: 500;
}

/* Attachments */
.attachments { margin-top: 4px; }
.attachment-image {
  max-width: 400px;
  max-height: 300px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 4px;
  display: block;
}
.attachment-file {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  margin-top: 4px;
  color: var(--text-link);
  text-decoration: none;
  font-size: 14px;
}
.attachment-file:hover { text-decoration: underline; }
.attachment-file .file-size {
  color: var(--text-muted);
  font-size: 12px;
}

/* Embeds */
.embed {
  display: flex;
  max-width: 520px;
  border-left: 4px solid var(--accent);
  background: var(--embed-bg);
  border-radius: 0 4px 4px 0;
  padding: 12px;
  margin-top: 4px;
}
.embed-content { flex: 1; min-width: 0; }
.embed-title {
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 4px;
}
.embed-title a { color: var(--text-link); text-decoration: none; }
.embed-title a:hover { text-decoration: underline; }
.embed-description {
  font-size: 14px;
  color: var(--text-secondary);
  white-space: pre-wrap;
  word-wrap: break-word;
}
.embed-thumbnail {
  width: 80px;
  height: 80px;
  max-width: 80px;
  max-height: 80px;
  border-radius: 4px;
  margin-left: 12px;
  object-fit: cover;
  flex-shrink: 0;
}
.embed-image {
  max-width: 400px;
  max-height: 300px;
  border-radius: 4px;
  margin-top: 8px;
}

/* Reactions */
.reactions {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 4px;
}
.reaction {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--reaction-bg);
  border: 1px solid var(--reaction-border);
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 14px;
  cursor: default;
}
.reaction .reaction-count {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 500;
}

/* Thread indicator */
.thread-indicator {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--text-link);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 4px;
  padding: 4px 0;
}
.thread-indicator:hover { text-decoration: underline; }
.thread-indicator svg { width: 16px; height: 16px; fill: currentColor; }

/* Thread panel */
#thread-panel {
  width: 400px;
  min-width: 400px;
  background: var(--bg-secondary);
  border-left: 1px solid var(--bg-tertiary);
  display: none;
  flex-direction: column;
}
#thread-panel.open { display: flex; }
#thread-panel-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--bg-tertiary);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
#thread-panel-header .thread-title {
  font-weight: 600;
  font-size: 14px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#thread-close {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 20px;
  padding: 4px;
  line-height: 1;
}
#thread-close:hover { color: var(--text-primary); }
#thread-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px 0;
}

/* Search results */
#search-results {
  display: none;
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
#search-results.open { display: block; }
.search-result {
  padding: 12px;
  background: var(--bg-secondary);
  border-radius: 8px;
  margin-bottom: 8px;
  cursor: pointer;
}
.search-result:hover { background: var(--bg-hover); }
.search-result .sr-channel {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.search-result .sr-header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 4px;
}
.search-result .sr-author { font-weight: 600; font-size: 14px; }
.search-result .sr-time { font-size: 12px; color: var(--text-muted); }
.search-result .sr-content { font-size: 14px; color: var(--text-secondary); }
.search-result .sr-content mark {
  background: rgba(88, 101, 242, 0.4);
  color: var(--text-primary);
  border-radius: 2px;
  padding: 0 1px;
}
#search-results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
#search-results-header h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
}
#search-close {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 18px;
}
#search-close:hover { color: var(--text-primary); }

/* Date separator */
.date-separator {
  display: flex;
  align-items: center;
  margin: 16px 16px 8px;
}
.date-separator::before, .date-separator::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.date-separator span {
  padding: 0 8px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
}

/* System message */
.system-message {
  padding: 4px 48px 4px 72px;
  color: var(--text-muted);
  font-size: 14px;
  font-style: italic;
}
.system-message .pin-link {
  color: var(--text-secondary);
  text-decoration: none;
  font-style: normal;
}
.system-message .pin-link:hover { text-decoration: underline; color: var(--text-primary); }

/* Image lightbox */
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
#lightbox.open { display: flex; }
#lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: 4px;
}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">Discord Archive</div>
  <div id="channel-list"></div>
</div>

<div id="main">
  <div id="header">
    <div class="channel-name"><span class="hash">#</span><span id="current-channel-name">Select a channel</span></div>
    <div class="channel-info" id="current-channel-info"></div>
    <div id="search-container">
      <input type="text" id="search-input" placeholder="Search messages...">
    </div>
  </div>
  <div id="messages-container">
    <div id="messages-list">
      <div class="empty-state">Select a channel to view messages</div>
    </div>
  </div>
  <div id="search-results">
    <div id="search-results-header">
      <h3 id="search-results-title"></h3>
      <button id="search-close">&times;</button>
    </div>
    <div id="search-results-list"></div>
  </div>
</div>

<div id="thread-panel">
  <div id="thread-panel-header">
    <span class="thread-title" id="thread-title">Thread</span>
    <button id="thread-close">&times;</button>
  </div>
  <div id="thread-messages"></div>
</div>

<div id="lightbox"><img id="lightbox-img" src="" alt=""></div>

<script>
const ARCHIVE_BASE = 'archive';

let indexData = null;
let channelCache = {};
let currentChannelId = null;
let searchTimeout = null;

// ── Bootstrap ──
async function init() {
  try {
    const resp = await fetch(`${ARCHIVE_BASE}/index.json`);
    if (!resp.ok) throw new Error(resp.statusText);
    indexData = await resp.json();
  } catch (e) {
    document.getElementById('messages-list').innerHTML =
      `<div class="empty-state">
        Could not load <code>archive/index.json</code>.<br>
        Run <code>./build_index.py</code> first, then serve via<br>
        <code>python -m http.server 5272</code>
      </div>`;
    return;
  }
  renderChannelList();
  setupSearch();
  setupLightbox();

  // Open channel from URL hash: #channelId or #channelId/messageId
  const hash = location.hash.slice(1);
  if (hash) {
    const [channelPart, messagePart] = hash.split('/');
    const ch = indexData.channels.find(c => c.id === channelPart || c.name === channelPart);
    if (ch) selectChannel(ch.id, messagePart);
  }

  // Handle hash changes (permalink clicks)
  window.addEventListener('hashchange', () => {
    const h = location.hash.slice(1);
    if (!h) return;
    const [chPart, msgPart] = h.split('/');
    if (msgPart && chPart === currentChannelId) {
      scrollToMessage(msgPart);
    } else {
      const ch = indexData.channels.find(c => c.id === chPart || c.name === chPart);
      if (ch) selectChannel(ch.id, msgPart);
    }
  });
}

// ── Channel sidebar ──
function renderChannelList() {
  const list = document.getElementById('channel-list');
  list.innerHTML = indexData.channels.map(ch =>
    `<div class="channel-item" data-id="${ch.id}" onclick="selectChannel('${ch.id}')">
      <span class="hash">#</span>
      <span class="name">${esc(ch.name)}</span>
      <span class="count">${ch.message_count}</span>
    </div>`
  ).join('');
}

async function selectChannel(channelId, scrollToMessageId) {
  currentChannelId = channelId;
  if (!scrollToMessageId) {
    location.hash = channelId;
  }
  const ch = indexData.channels.find(c => c.id === channelId);
  if (!ch) return;

  // Update sidebar active state
  document.querySelectorAll('.channel-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === channelId);
  });

  // Update header
  document.getElementById('current-channel-name').textContent = ch.name;
  document.getElementById('current-channel-info').textContent =
    `${ch.message_count} messages`;

  // Hide search results
  closeSearch();

  // Load messages
  const list = document.getElementById('messages-list');
  const scroller = document.getElementById('messages-container');
  list.innerHTML = '<div class="loading">Loading messages...</div>';

  const messages = await loadChannel(channelId);
  renderMessages(messages, list);

  // Scroll to specific message or bottom (most recent).
  // Double-rAF ensures layout is fully resolved after innerHTML assignment.
  requestAnimationFrame(() => requestAnimationFrame(() => {
    if (scrollToMessageId) {
      const el = document.getElementById(`msg-${scrollToMessageId}`);
      if (el) {
        el.scrollIntoView({ block: 'center' });
        el.style.background = 'var(--bg-active)';
        setTimeout(() => el.style.background = '', 2000);
      }
    } else {
      scroller.scrollTop = scroller.scrollHeight;
    }
  }));
}

function scrollToMessage(messageId) {
  const el = document.getElementById(`msg-${messageId}`);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.style.background = 'var(--bg-active)';
    setTimeout(() => el.style.background = '', 2000);
  }
}

async function loadChannel(channelId) {
  if (channelCache[channelId]) return channelCache[channelId];
  const ch = indexData.channels.find(c => c.id === channelId);
  if (!ch) return [];
  const resp = await fetch(`${ARCHIVE_BASE}/${ch.file}`);
  const data = await resp.json();
  // Reverse to chronological (oldest first)
  const messages = data.reverse();
  channelCache[channelId] = messages;
  return messages;
}

async function loadThread(threadFile) {
  const resp = await fetch(`${ARCHIVE_BASE}/threads/${encodeURIComponent(threadFile)}`);
  const data = await resp.json();
  return data.reverse();
}

// ── Render messages ──
function renderMessages(messages, container, isThread = false) {
  if (!messages.length) {
    container.innerHTML = '<div class="empty-state">No messages</div>';
    return;
  }

  let html = '';
  let lastAuthorId = null;
  let lastDate = null;
  let lastTimestamp = null;

  for (const msg of messages) {
    const date = new Date(msg.timestamp);
    const dateStr = formatDate(date);

    // Date separator
    if (dateStr !== lastDate) {
      html += `<div class="date-separator"><span>${dateStr}</span></div>`;
      lastDate = dateStr;
      lastAuthorId = null;
    }

    // System messages (joins, pins, etc.)
    if (msg.type && msg.type !== 0 && msg.type !== 19) {
      html += renderSystemMessage(msg);
      lastAuthorId = null;
      continue;
    }

    const sameAuthor = msg.author?.id === lastAuthorId;
    const timeDiff = lastTimestamp ? (date - new Date(lastTimestamp)) : Infinity;
    const showHeader = !sameAuthor || timeDiff > 7 * 60 * 1000; // 7 min group window

    html += renderMessage(msg, showHeader, isThread);

    if (showHeader) lastAuthorId = msg.author?.id;
    lastTimestamp = msg.timestamp;
  }

  container.innerHTML = html;
}

function renderMessage(msg, showHeader, isThread) {
  const author = msg.author || {};
  const displayName = author.global_name || author.username || 'Unknown';
  const avatarUrl = getAvatarUrl(author);
  const date = new Date(msg.timestamp);
  let parts = [];

  // Reply indicator
  if (msg.referenced_message) {
    const ref = msg.referenced_message;
    const refAuthor = ref.author || {};
    const refName = refAuthor.global_name || refAuthor.username || 'Unknown';
    const refAvatar = getAvatarUrl(refAuthor);
    const refSnippet = (ref.content || '').slice(0, 120);
    parts.push(
      `<div class="reply-indicator">` +
      `<span class="reply-avatar"><img src="${esc(refAvatar)}" onerror="this.style.display='none'"></span>` +
      `<span class="reply-author">${esc(refName)}</span>` +
      `<span class="reply-content">${esc(refSnippet)}</span>` +
      `</div>`
    );
  }

  const headerClass = showHeader ? ' has-header' : '';
  let inner = '';

  if (showHeader) {
    inner += `<div class="avatar"><img src="${esc(avatarUrl)}" onerror="this.parentElement.innerHTML='<svg viewBox=\\'0 0 40 40\\' xmlns=\\'http://www.w3.org/2000/svg\\'><rect fill=\\'%235865f2\\' width=\\'40\\' height=\\'40\\' rx=\\'20\\'/><text x=\\'20\\' y=\\'26\\' text-anchor=\\'middle\\' fill=\\'white\\' font-size=\\'18\\'>${esc(displayName[0])}</text></svg>'"></div>`;
    inner += `<div class="msg-header">`;
    inner += `<span class="author">${esc(displayName)}</span>`;
    inner += `<a class="timestamp" href="#${currentChannelId}/${msg.id}" onclick="event.stopPropagation()">${formatTimestamp(date)}</a>`;
    if (msg.edited_timestamp) inner += `<span class="edited-tag">(edited)</span>`;
    inner += `</div>`;
  }

  if (msg.content) {
    inner += `<div class="msg-content">${renderContent(msg.content)}</div>`;
  }

  // Attachments
  if (msg.attachments?.length) {
    inner += '<div class="attachments">';
    for (const att of msg.attachments) {
      if (att.content_type?.startsWith('image/')) {
        const localPath = `${ARCHIVE_BASE}/attachments/${att.id}_${att.filename}`;
        inner += `<img class="attachment-image" src="${esc(localPath)}" alt="${esc(att.filename)}" loading="lazy" onclick="openLightbox(this.src)" onerror="this.outerHTML='<a class=\\'attachment-file\\' href=\\'${esc(att.url)}\\' target=\\'_blank\\'>${esc(att.filename)}<span class=\\'file-size\\'>${formatSize(att.size)}</span></a>'">`;
      } else {
        const localPath = `${ARCHIVE_BASE}/attachments/${att.id}_${att.filename}`;
        inner += `<a class="attachment-file" href="${esc(localPath)}" target="_blank">${esc(att.filename)} <span class="file-size">${formatSize(att.size)}</span></a>`;
      }
    }
    inner += '</div>';
  }

  // Embeds
  if (msg.embeds?.length) {
    for (const embed of msg.embeds) {
      if (!embed.title && !embed.description) continue;
      inner += '<div class="embed"><div class="embed-content">';
      if (embed.title) {
        if (embed.url) {
          inner += `<div class="embed-title"><a href="${esc(embed.url)}" target="_blank">${esc(embed.title)}</a></div>`;
        } else {
          inner += `<div class="embed-title">${esc(embed.title)}</div>`;
        }
      }
      if (embed.description) {
        inner += `<div class="embed-description">${renderContent(embed.description)}</div>`;
      }
      if (embed.image?.url) {
        inner += `<img class="embed-image" src="${esc(embed.image.url)}" loading="lazy">`;
      }
      inner += '</div>';
      if (embed.thumbnail?.url) {
        inner += `<img class="embed-thumbnail" src="${esc(embed.thumbnail.url)}" loading="lazy">`;
      }
      inner += '</div>';
    }
  }

  // Reactions
  if (msg.reactions?.length) {
    inner += '<div class="reactions">';
    for (const r of msg.reactions) {
      const emoji = r.emoji.id
        ? `<img src="https://cdn.discordapp.com/emojis/${r.emoji.id}.webp?size=20" alt="${esc(r.emoji.name)}" style="width:18px;height:18px;vertical-align:middle">`
        : r.emoji.name;
      inner += `<span class="reaction">${emoji} <span class="reaction-count">${r.count}</span></span>`;
    }
    inner += '</div>';
  }

  // Thread indicator
  if (msg.thread && !isThread) {
    const ch = indexData.channels.find(c => c.id === currentChannelId);
    const threadInfo = ch?.threads?.find(t => t.id === msg.thread.id);
    if (threadInfo) {
      inner += `<div class="thread-indicator" data-thread-file="${esc(threadInfo.file)}" data-thread-name="${esc(msg.thread.name || 'Thread')}">` +
        `<svg viewBox="0 0 24 24"><path d="M12 2.5C6.5 2.5 2 6.03 2 10.4c0 2.48 1.38 4.7 3.54 6.16L4 21.5l5.1-2.63c.93.2 1.9.33 2.9.33 5.5 0 10-3.53 10-7.8S17.5 2.5 12 2.5z"/></svg>` +
        `${esc(msg.thread.name || 'Thread')}` +
        `</div>`;
    }
  }

  parts.push(`<div class="message-group${headerClass}" id="msg-${msg.id}">${inner}</div>`);
  return parts.join('');
}

function renderSystemMessage(msg) {
  const author = msg.author || {};
  const name = author.global_name || author.username || 'Someone';
  const avatarUrl = getAvatarUrl(author);
  const avatarHtml = `<img src="${esc(avatarUrl)}" onerror="this.style.display='none'" style="width:16px;height:16px;border-radius:50%;vertical-align:middle;margin-right:4px">`;

  if (msg.type === 18) {
    // Pinned message — link to the pinned message if we have a message_id
    const ref = msg.message_reference;
    const refMsg = msg.referenced_message;
    let pinLink = '';
    if (ref?.message_id) {
      const href = `#${ref.channel_id || currentChannelId}/${ref.message_id}`;
      const label = refMsg?.content ? esc(refMsg.content.slice(0, 120)) : 'a message';
      pinLink = ` <a href="${href}" class="pin-link" onclick="scrollToMessage('${ref.message_id}');event.preventDefault()">${label}</a>`;
    }
    return `<div class="system-message" id="msg-${msg.id}">${avatarHtml}${esc(name)} pinned${pinLink}</div>`;
  }

  const typeText = {
    7: `${name} joined the server`,
    8: `${name} boosted the server`,
  };
  const text = typeText[msg.type] || `System message (type ${msg.type})`;
  return `<div class="system-message" id="msg-${msg.id}">${avatarHtml}${esc(text)}</div>`;
}

// ── Markdown rendering ──
function renderContent(text) {
  // Escape HTML first
  text = esc(text);

  // Code blocks (``` ... ```)
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code}</code></pre>`
  );

  // Inline code
  text = text.replace(/`([^`\n]+)`/g, '<code>$1</code>');

  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Italic (single * only; _ italic is too error-prone with URLs/usernames)
  text = text.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');

  // Strikethrough
  text = text.replace(/~~(.+?)~~/g, '<s>$1</s>');

  // Links (already in text or auto-detect URLs)
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  text = text.replace(/((?:^|[^"=]))(https?:\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank">$2</a>');

  // User mentions <@id> or <@!id>
  text = text.replace(/&lt;@!?(\d+)&gt;/g, (_, id) => {
    const user = indexData?.users?.[id];
    const name = user?.global_name || user?.username || 'Unknown User';
    return `<span class="mention">@${esc(name)}</span>`;
  });

  // Role mentions <@&id>
  text = text.replace(/&lt;@&amp;(\d+)&gt;/g, '<span class="mention">@role</span>');

  // Channel mentions <#id>
  text = text.replace(/&lt;#(\d+)&gt;/g, (_, id) => {
    const ch = indexData?.channels?.find(c => c.id === id);
    return ch
      ? `<span class="mention" style="cursor:pointer" onclick="selectChannel('${id}')">#${esc(ch.name)}</span>`
      : '<span class="mention">#channel</span>';
  });

  return text;
}

// ── Search ──
function setupSearch() {
  const input = document.getElementById('search-input');
  input.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    const q = input.value.trim();
    if (!q) { closeSearch(); return; }
    searchTimeout = setTimeout(() => runSearch(q), 300);
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') { input.value = ''; closeSearch(); input.blur(); }
  });
  document.getElementById('search-close').addEventListener('click', () => {
    document.getElementById('search-input').value = '';
    closeSearch();
  });
}

async function runSearch(query) {
  const panel = document.getElementById('search-results');
  const list = document.getElementById('search-results-list');
  const title = document.getElementById('search-results-title');
  const msgContainer = document.getElementById('messages-container');

  panel.classList.add('open');
  msgContainer.style.display = 'none';
  list.innerHTML = '<div class="loading" style="height:auto;padding:20px">Searching...</div>';

  const q = query.toLowerCase();
  const results = [];

  // Search across all channels
  for (const ch of indexData.channels) {
    const messages = await loadChannel(ch.id);
    for (const msg of messages) {
      if (msg.content?.toLowerCase().includes(q)) {
        results.push({ msg, channel: ch });
        if (results.length >= 100) break;
      }
    }
    if (results.length >= 100) break;
  }

  title.textContent = `${results.length}${results.length >= 100 ? '+' : ''} results for "${query}"`;

  if (!results.length) {
    list.innerHTML = '<div class="empty-state" style="height:auto;padding:40px">No results found</div>';
    return;
  }

  const re = new RegExp(`(${escapeRegex(query)})`, 'gi');
  list.innerHTML = results.map(({ msg, channel }) => {
    const author = msg.author || {};
    const name = author.global_name || author.username || 'Unknown';
    const date = new Date(msg.timestamp);
    const highlighted = esc(msg.content).replace(re, '<mark>$1</mark>');
    return `<div class="search-result" onclick="selectChannel('${channel.id}', '${msg.id}')">
      <div class="sr-channel">#${esc(channel.name)}</div>
      <div class="sr-header">
        <span class="sr-author">${esc(name)}</span>
        <span class="sr-time">${formatTimestamp(date)}</span>
      </div>
      <div class="sr-content">${highlighted}</div>
    </div>`;
  }).join('');
}

function closeSearch() {
  document.getElementById('search-results').classList.remove('open');
  document.getElementById('messages-container').style.display = '';
}

// ── Thread panel ──
async function openThread(file, name) {
  const panel = document.getElementById('thread-panel');
  const container = document.getElementById('thread-messages');
  document.getElementById('thread-title').textContent = name;
  panel.classList.add('open');
  container.innerHTML = '<div class="loading">Loading thread...</div>';

  const messages = await loadThread(file);
  renderMessages(messages, container, true);
}

document.getElementById('thread-close').addEventListener('click', () => {
  document.getElementById('thread-panel').classList.remove('open');
});

// ── Lightbox ──
// Delegated click handler for thread indicators (avoids inline onclick escaping issues)
document.getElementById('messages-container').addEventListener('click', e => {
  const ti = e.target.closest('.thread-indicator');
  if (ti) openThread(ti.dataset.threadFile, ti.dataset.threadName);
});

function setupLightbox() {
  document.getElementById('lightbox').addEventListener('click', () => {
    document.getElementById('lightbox').classList.remove('open');
  });
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}

// ── Utilities ──
function esc(s) {
  if (!s) return '';
  const el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function getAvatarUrl(author) {
  if (author.avatar) {
    return `https://cdn.discordapp.com/avatars/${author.id}/${author.avatar}.png?size=40`;
  }
  // Default Discord avatar based on user ID
  const idx = author.id ? ((BigInt(author.id) >> 22n) % 6n) : 0n;
  return `https://cdn.discordapp.com/embed/avatars/${idx}.png`;
}

function formatTimestamp(date) {
  const now = new Date();
  const diff = now - date;
  const days = Math.floor(diff / 86400000);

  if (days === 0) {
    return 'Today at ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } else if (days === 1) {
    return 'Yesterday at ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  } else {
    return date.toLocaleDateString([], { month: '2-digit', day: '2-digit', year: 'numeric' }) +
      ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
}

function formatDate(date) {
  return date.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

// ── Keyboard shortcut ──
document.addEventListener('keydown', e => {
  if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
    const active = document.activeElement;
    if (active.tagName !== 'INPUT' && active.tagName !== 'TEXTAREA') {
      e.preventDefault();
      document.getElementById('search-input').focus();
    }
  }
  if (e.key === 'Escape') {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('thread-panel').classList.remove('open');
  }
});

// Expose for onclick handlers
window.selectChannel = selectChannel;
window.openThread = openThread;
window.openLightbox = openLightbox;

init();
</script>
