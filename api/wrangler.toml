name = "discord-archive-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "DB"
database_name = "discord-archive"
database_id = "YOUR_DATABASE_ID"  # from `wrangler d1 create`

[dev]
port = 5273

[vars]
CORS_ORIGIN = "*"
GUILD_ID = ""
ARCHIVE_DB_URL = ""

# Cron: run the scheduled() handler every 10 minutes to incrementally
# update D1 from Discord. DISCORD_TOKEN must be set via
# `wrangler secret put DISCORD_TOKEN`.
[triggers]
crons = ["*/10 * * * *"]
